<header>
  <h1>{{ title }}</h1>
  <button type="button" (click)="openSettings()">Nastavitve</button>
</header>

<main>
  <section class="toolbar" aria-label="Orodja za uporabnike">
    <label>
      Poišči uporabnike
      <input type="search" placeholder="Ime ali priimek" />
    </label>
  </section>

  <section>
    <h2>Uporabniki</h2>
    <p>Seznam uporabnikov</p>
  </section>
</main>

@if (settingsOpen) {
  <div class="backdrop">
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
      <h2 id="settings-title">Auth</h2>

      <label>
        CLIENT_ID
        <input type="password" />
      </label>

      <label>
        CLIENT_SECRET
        <input type="password" />
      </label>

      <button type="button" (click)="closeSettings()">Shrani</button>
    </section>
  </div>
}
